  - TF-IDF 폴백 패턴 (키워드 기반 → 임베딩 기반)
  - Pydantic 모델 기반 데이터 구조
  - 결정론적 우선, LLM 후순위 (deterministic first)
  - 아티팩트 기반 상태 관리 (JSON/Markdown 파일)

existing_dependencies:
