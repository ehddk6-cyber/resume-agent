# resume-agent 상위 0.01% 도달 개선 명세
# Generated by Ouroboros Seed Architect
# Date: 2026-04-02

goal: >
  resume-agent를 상위 0.01% 수준의 커리어 코칭 시스템으로 개선한다.
  현재 상위 ~12% 수준에서 의미적 이해, 결과 기반 학습, 개인화를 통해
  상위 1~3% 수준에 도달하는 것이 1차 목표이다.

constraints:
  - Python >= 3.10 (기존 호환성 유지)
  - 기존 319개 테스트 모두 통과 유지
  - 기존 API 호환성 깨지지 않음
  - 외부 API 의존성 최소화 (로컬 우선)
  - 한국어 처리에 최적화 (kiwipiepy, sentence-transformers)

acceptance_criteria:
  - 의미적 경험-질문 매칭 정확도 40% 이상 향상
  - 임베딩 기반 검색이 키워드 매칭보다 유의미하게 우수
  - 전체 테스트 커버리지 80% 이상 달성
  - 기존 기능 회귀 없음 (178개 기존 테스트 통과)

ontology_schema:
  SemanticSearchEngine:
    description: 경험 카드와 질문 간의 의미적 유사도를 계산하는 검색 엔진
    fields:
      query_embedding:
        type: array
        description: 질문/텍스트의 임베딩 벡터
      experience_embeddings:
        type: array
        description: 경험 카드들의 임베딩 벡터 저장소
      similarity_score:
        type: number
        description: 코사인 유사도 점수 (0.0 ~ 1.0)
      model_name:
        type: string
        description: 사용 중인 임베딩 모델명
      fallback_enabled:
        type: boolean
        description: 임베딩 실패 시 TF-IDF 폴백 활성화 여부

  ExperienceDeepAnalyzer:
    description: 경험의 본질적 성격을 분석하는 심층 분석기
    fields:
      core_competencies:
        type: array
        description: 경험이 증명하는 핵심 역량 목록
      interviewer_impression:
        type: object
        description: 면접관 예상 반응 (신뢰도, 차별화, 위험도)
      hidden_strengths:
        type: array
        description: 경험 카드에서 드러나지 않은 강점 패턴

  FeedbackTracker:
    description: 추천 전략의 실제 합격률을 추적하는 시스템
    fields:
      allocation_id:
        type: string
        description: 경험 배치 조합 식별자
      company_type:
        type: string
        description: 기업 유형 (공공/공기업/대기업/스타트업)
      question_types:
        type: array
        description: 질문 유형 목록
      outcome:
        type: string
        description: 결과 (pass/fail_interview/fail_document)
      feedback:
        type: string
        description: 사용자 피드백 텍스트

evaluation_principles:
  semantic_accuracy:
    description: 의미적 매칭이 키워드 매칭보다 정확한가
    weight: 0.35
  test_coverage:
    description: 테스트 커버리지가 80% 이상인가
    weight: 0.25
  backward_compatibility:
    description: 기존 기능이 모두 동작하는가
    weight: 0.25
  code_quality:
    description: 코드 품질 (타입 힌트, 문서화, 구조)
    weight: 0.15

exit_conditions:
  all_tests_pass:
    description: 모든 테스트가 통과하는가
    criteria: pytest tests/ 실행 시 0 failures
  coverage_above_80:
    description: 전체 커버리지가 80% 이상인가
    criteria: pytest --cov 보고서에서 TOTAL >= 80%
  semantic_search_working:
    description: 의미적 검색이 동작하는가
    criteria: SentenceTransformer 또는 TF-IDF 폴백이 정상 작동

